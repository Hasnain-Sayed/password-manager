                        alt="Github logo"><span class="md:text-md text-sm">GitHub</span></button></div>
        </nav>
    </header>
    <main>
        <section>
            
            <h2 class="parichar">🔐PassVault</h2>
            <p class="parichar">//Local Password Manager</p>

            <div class="add-cart">
                <div class="card-title">Add New Entry</div>

                <form id="entryForm">
                    <div class="field">
                        <label for="siteInput">Website / App Name</label>
                        <div class="input-wrap">
                            <input type="text" id="siteInput" placeholder="e.g. github.com" autocomplete="off" required />
                        </div>
                    </div>

                    <div class="field">
                        <label for="passInput">Password</label>
                        <div class="input-wrap">
                            <input type="password" id="passInput" class="password-input" placeholder="Enter password"
                                autocomplete="off" required />
                            <button type="button" class="toggle-btn" id="toggleInput" title="Show / Hide"
                                onclick="toggleInputPass()">👁</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-add">+ Save to Vault</button>
                </form>
            </div>

            <div class="card">
                <div class="vault-header">
                    <div class="card-title" style="margin-bottom:0">Saved Entries</div>
                    <div class="vault-count">Total: <span id="countDisplay"></span></div>
                </div>
                <ul class="vault-list" id="vaultList">
                    
                </ul>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PassVault. All rights reserved by Blaze.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
